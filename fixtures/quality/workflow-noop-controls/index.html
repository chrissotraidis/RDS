<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>No-op Workflow Fixture</title>
  <style>
    body { margin: 0; font-family: Inter, system-ui, sans-serif; background: #f3f5f7; color: #17202a; }
    main { max-width: 980px; margin: 0 auto; padding: 32px 20px; }
    .toolbar { display: flex; gap: 12px; flex-wrap: wrap; margin: 20px 0; }
    button, a { min-height: 42px; border: 1px solid #b8c2cc; border-radius: 6px; padding: 0 14px; background: white; color: #17202a; font-weight: 700; }
    table { width: 100%; border-collapse: collapse; background: white; }
    td, th { padding: 12px; border-bottom: 1px solid #dfe5ea; text-align: left; }
  </style>
</head>
<body>
  <main>
    <h1>Operations dashboard</h1>
    <p>Review, approve, reject, filter, export, and update status for incoming requests.</p>
    <div class="toolbar">
      <button>Approve selected</button>
      <button>Reject selected</button>
      <button>Export report</button>
      <a href="#">Settings</a>
    </div>
    <table><thead><tr><th>Status</th><th>Request</th><th>Owner</th></tr></thead><tbody><tr><td>Pending</td><td>Fixture review</td><td>Ops</td></tr></tbody></table>
  </main>
</body>
</html>
