name: API Service
type: api_service
keywords:
  - api
  - rest
  - graphql
  - endpoint
  - microservice
  - service
  - json
  - backend
  - headless
  - webhook
description: >
  Backend API service built on Rails 8+ in API mode. Exposes RESTful or
  GraphQL endpoints with token-based authentication, rate limiting,
  versioning, and structured error responses. Serves as backend for
  mobile apps, SPAs, third-party integrations, or microservice
  architectures.

framework:
  primary: Rails 8+ (API mode)
  serialization: Jbuilder, ActiveModelSerializers, or Alba
  auth: JWT or API key-based (custom or Doorkeeper for OAuth)
  docs: Rswag (OpenAPI/Swagger) or manual OpenAPI spec
  deployment: Kamal 2

workflow:
  capabilities:
    http_routes: true
    background_work: true
    email_delivery: true
    authn: true
    authz: true
    seed_data: true
    native_tests: true

mcp:
  capabilities:
    - database_schema
    - docs_lookup
  hints:
    database_schema:
      adapter: sqlite3
      schema_paths: ["db/schema.rb"]
      migration_paths: ["db/migrate"]
      model_paths: ["app/models"]
    docs_lookup:
      frameworks: ["rails"]

finalization:
  commands:
    - bundle install
    - bin/rails db:prepare
  checks:
    - name: Boot check
      command: "bin/rails runner 'puts Rails.version'"
      type: custom
      required: true

verification:
  checks:
    - name: Solid stack
      type: solid_stack
      required: true
  setup_commands:
    - bin/setup
  boot_command: bin/rails server -p 3000 -d
  health_checks:
    - url: "http://localhost:3000/up"
      expected_status: 200
    - url: "http://localhost:3000/api/v1/health"
      expected_status: 200
  test_command: bin/rails test
  cleanup_command: kill $(cat tmp/pids/server.pid)

sections:
  - name: Local Development
    phase: pipeline
    labels: ["setup"]
    description: >
      Development environment setup that ensures the API boots and
      responds locally with zero external dependencies. This is the
      foundation for pipeline iteration — every tier gate check depends
      on the API being bootable and returning valid JSON.
    rails_tools:
      - bin/setup (Rails default setup script)
      - SQLite (Rails 8 default, zero-dependency database)
      - Solid Queue (zero-dependency job backend)
    guidance:
      - The bootstrap task (task 0) MUST produce a project that starts with bin/rails server
      - bin/setup MUST run successfully (bundle install + db:prepare) with no manual steps
      - >
        If a Procfile.dev is needed (e.g., for a queue worker), use this
        canonical content — do NOT invent process entries:
          web: bin/rails server
          queue: bin/jobs
        Solid Cable and Solid Cache do NOT need their own processes.
        If using tailwindcss-rails, the CSS watcher line MUST be:
          css: bin/rails "tailwindcss:watch[always]"
        The [always] flag is REQUIRED — without it the watcher exits
        immediately when foreman closes stdin.
      - Use SQLite for development and test databases (Rails 8 default)
      - Create db/seeds.rb with demo data for all core API resources
      - Create .env.example listing optional integration variables (none required to boot)
      - The /up health check endpoint MUST respond 200 immediately after bootstrap
      - Create an API-specific health endpoint (e.g., /api/v1/health) that returns JSON
      - All external service integrations MUST work without ENV vars in development (use stubs or graceful nil handling)
      - Do NOT generate tasks for production hosting, domain config, or SSL during pipeline execution
    solid_stack_setup: >
      Rails 8 Solid Queue (and Solid Cache if used) each require their own
      SQLite database in development. The bootstrap task MUST configure
      these correctly or the app will crash when any background job or
      cache write is triggered. API-mode apps typically need Solid Queue
      but may skip Solid Cache and Solid Cable unless specifically required.

      Required bootstrap steps for the Solid stack:

      1. Run the install generators for needed components only:
           bin/rails solid_queue:install
           bin/rails solid_cache:install    (only if caching is needed)

      2. Verify database.yml has entries for ALL environments, not just
         production. After running the generators, database.yml should
         include the queue database under development:

           development:
             primary:
               <<: *default
               database: storage/development.sqlite3
             queue:
               <<: *default
               database: storage/development_queue.sqlite3
               migrations_paths: db/queue_migrate

      3. Verify config/application.rb (not just production.rb) contains
         the connects_to directives so they apply in all environments:
           config.solid_queue.connects_to = { database: { writing: :queue } }

      4. Run bin/rails db:prepare to create and load schemas for all
         databases including queue.

      Common failure mode: The generators sometimes only add database
      entries under the production section of database.yml, and place
      connects_to config in config/environments/production.rb only. The
      bootstrap task MUST verify these exist in the development section
      and in application.rb (or development.rb) before considering setup
      complete.

      If the app does not need background jobs, skip Solid Queue entirely
      rather than installing it and leaving it misconfigured.

      ANTI-PATTERNS — common mistakes AI agents make with Procfile.dev:
      - Do NOT add `cable: bin/rails solid_cable:start` — there is no such
        command. Solid Cable polls from within the Puma process.
      - Do NOT add `cache: bin/rails solid_cache:start` — there is no such
        command. Solid Cache operates inline within the web process.
      - Do NOT use bare `tailwindcss:watch` — it exits immediately when
        stdin is closed (which foreman does). Use `tailwindcss:watch[always]`.

  - name: Endpoints & Routing
    phase: pipeline
    labels: ["backend"]
    description: >
      RESTful resource routes, versioned API namespaces, request/response
      schemas, and pagination.
    rails_tools:
      - ActionController::API (lightweight base controller)
      - ActionDispatch routing with namespace versioning
      - Jbuilder or Alba (JSON serialization)
    guidance:
      - Version APIs from day one (api/v1/ namespace)
      - Use consistent JSON response envelopes (data, meta, errors)
      - Implement cursor-based or page-based pagination on all list endpoints
      - Return appropriate HTTP status codes; don't overuse 200 for errors
      - Define clear request/response schemas before implementation

  - name: Authentication & Authorization
    phase: pipeline
    labels: ["auth", "backend"]
    description: >
      API key management, token-based auth (JWT or session tokens),
      OAuth flows for third-party access, and scoped permissions.
    rails_tools:
      - has_secure_password (for user-facing auth)
      - Custom token middleware or Doorkeeper (OAuth2)
      - Rails credentials (secret storage)
    guidance:
      - Use bearer tokens in Authorization header, not query params
      - Implement API key rotation and revocation
      - Scope permissions per token or per API key
      - Return 401 for missing auth, 403 for insufficient permissions
      - Log all authentication events for audit
      - Seed at least one API key or test user token in db/seeds.rb for local testing

  - name: Models & Data Layer
    phase: pipeline
    labels: ["backend", "database"]
    description: >
      ActiveRecord models, database schema, query optimization,
      and data integrity rules.
    rails_tools:
      - ActiveRecord (models, migrations, associations)
      - ActiveStorage (file handling via API)
    guidance:
      - Use database constraints as the source of truth for integrity
      - Design models for API consumption (avoid leaking internal structure)
      - Use serializers to control exactly what fields are exposed
      - Plan for soft deletes on user-facing resources
      - Use SQLite-compatible column types and queries in development
      - Include seed data for every model in db/seeds.rb

  - name: Middleware & Cross-Cutting Concerns
    phase: pipeline
    labels: ["backend"]
    description: >
      Rate limiting, CORS configuration, request logging, error
      handling, and request validation.
    rails_tools:
      - Rack::Cors (CORS handling)
      - Rack::Attack (rate limiting and throttling)
      - ActiveSupport::Notifications (instrumentation)
      - Custom exception handling middleware
    guidance:
      - Configure CORS explicitly; don't use wildcard in production
      - Implement rate limiting per API key or IP with Rack::Attack
      - Return structured error JSON with error codes, not just messages
      - Log request/response metadata for debugging (not sensitive data)
      - Use rescue_from in base controller for consistent error responses
      - In development, CORS should allow localhost origins for local testing

  - name: Background Jobs & Webhooks
    phase: pipeline
    labels: ["backend"]
    description: >
      Async processing for heavy operations and outbound webhook
      delivery to consumers.
    rails_tools:
      - Solid Queue (job backend)
      - ActiveJob (job interface)
      - ActionMailer (transactional emails)
    guidance:
      - Offload anything over 200ms to a background job
      - Implement webhook delivery with retries and exponential backoff
      - Make all jobs idempotent; use unique job keys to prevent duplicates
      - Provide webhook signature verification for consumers
      - The bootstrap or readiness task MUST prove local background execution works before any endpoint depends on async jobs or webhooks

  - name: Documentation & Developer Experience
    phase: pipeline
    labels: ["backend"]
    description: >
      API documentation, interactive exploration, and onboarding
      for consumers.
    rails_tools:
      - Rswag (generates OpenAPI spec from RSpec tests)
      - Custom /docs endpoint or hosted Swagger UI
    guidance:
      - Generate OpenAPI 3.x spec; keep it in sync with implementation
      - Include request/response examples for every endpoint
      - Document error codes and their meanings
      - Provide a Postman collection or equivalent for quick testing

  - name: Testing
    phase: pipeline
    labels: ["testing"]
    description: >
      Request specs, contract testing, and integration tests for
      all API endpoints. Tests are generated alongside feature tasks
      and must be runnable locally with zero external dependencies.
      The spec's GIVEN/WHEN/THEN scenarios are the primary source for
      integration test cases.
    rails_tools:
      - Minitest (default) with request specs
      - Fixtures or FactoryBot
    guidance:
      - Every endpoint or auth feature task MUST ship with at least one relevant request, contract, or integration test derived from the spec's GIVEN/WHEN/THEN scenarios
      - All tests MUST pass with bin/rails test using only local resources
      - No test may depend on network access, deployed services, or production credentials
      - Write request specs for every endpoint and status code path
      - Test authentication and authorization edge cases explicitly
      - Validate JSON response structure, not just status codes
      - Test rate limiting behavior
      - Mock external APIs with WebMock or VCR — never call real services in tests
      - Use fixtures or factories that mirror db/seeds.rb structure

  - name: Deployment & Infrastructure
    phase: post_pipeline
    description: >
      Production deployment, scaling, monitoring, and health checks.
      This section is NOT executed during pipeline iterations. Tasks
      derived from this section should only be generated after the
      implementation has passed analysis and the pipeline has converged
      on a working local build.
    rails_tools:
      - Kamal 2 (deployment)
      - Thruster (HTTP/2 proxy)
      - Rails credentials (secrets)
    guidance:
      - Expose /health or /up endpoint for load balancer checks
      - Use Kamal for rolling deploys with health check gates
      - Plan horizontal scaling strategy (stateless controllers)
      - Monitor API response times and error rates from day one
      - DO NOT generate deployment tasks during pipeline iterations
      - Deployment configuration is deferred until the project passes all tier gates and analysis
