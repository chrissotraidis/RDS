name: Web App
type: web_app
keywords:
  - web
  - website
  - frontend
  - ui
  - dashboard
  - responsive
  - mobile
  - browser
  - spa
  - page
  - webapp
  - portal
  - saas
  - platform
description: >
  Full-stack web application built on Rails 8+. Uses Hotwire (Turbo +
  Stimulus) for reactive UI without heavy JavaScript frameworks. Covers
  models, controllers, views, authentication, background jobs, real-time
  features, and deployment via Kamal.

template:
  local_path: vendor/rails-starter
  description: >
    RDS-owned Rails 8 starter generated from stock Rails and prepared for
    non-interactive setup on Zo. Copy this starter instead of running rails new.
  includes:
    - PostgreSQL configuration
    - Hotwire defaults
    - Propshaft asset pipeline
    - Solid Queue/Cache/Cable (production config)
    - bin/template-setup for app renaming

framework:
  primary: Rails 8+
  frontend: Hotwire (Turbo Drive, Turbo Frames, Turbo Streams), Stimulus
  asset_pipeline: Propshaft with importmaps
  css: App stylesheet using plain CSS
  database: PostgreSQL
  deployment: Kamal 2
  proxy: Thruster (HTTP/2, SSL, gzip)

workflow:
  capabilities:
    browser_ui: true
    http_routes: true
    background_work: true
    email_delivery: true
    authn: true
    authz: true
    seed_data: true
    accessibility: true
    native_tests: true

mcp:
  capabilities:
    - database_schema
    - docs_lookup
  hints:
    database_schema:
      adapter: postgresql
      schema_paths: ["db/schema.rb"]
      migration_paths: ["db/migrate"]
      model_paths: ["app/models"]
    docs_lookup:
      frameworks: ["rails", "hotwire", "turbo", "stimulus", "bootstrap"]

finalization:
  commands:
    - bundle install
    - bin/rails db:prepare
  checks:
    - name: Boot check
      command: "bin/rails runner 'puts Rails.version'"
      type: custom
      required: true

verification:
  checks:
    - name: Solid stack
      type: solid_stack
      required: true
  setup_commands:
    - bundle install
    - bin/rails solid_queue:install
    - bin/rails solid_cache:install
    - bin/rails solid_cable:install
    - bin/rails db:prepare
  boot_command: bin/rails server -p 3000 -d
  health_checks:
    - url: "http://localhost:3000/up"
      expected_status: 200
    - url: "http://localhost:3000/"
      expected_status: 200
  test_command: bin/rails test:all
  cleanup_command: kill $(cat tmp/pids/server.pid)

sections:
  - name: Local Development
    phase: pipeline
    labels: ["setup"]
    description: >
      Development environment setup that ensures the project boots and
      runs locally with zero external dependencies. This is the
      foundation for pipeline iteration — every tier gate check depends
      on the project being bootable.
    rails_tools:
      - bin/setup (Rails default setup script)
      - bin/dev (Procfile.dev via foreman)
      - PostgreSQL (development and test databases)
      - Solid Queue, Solid Cache, Solid Cable (production database-backed adapters)
    guidance:
      - >
        The bootstrap task (task 0) MUST copy the RDS Rails starter into the
        project directory instead of running `rails new`. The starter includes
        the Rails skeleton, PostgreSQL config, Hotwire defaults, Propshaft, and
        Solid Stack production config. After copying, run
        `bin/template-setup --app-name=<name> --yes`, then
        `bundle install && bin/rails db:prepare`, and verify boot.
      - bin/setup MUST run successfully (bundle install + db:prepare) with no manual steps
      - >
        Do NOT manually create Procfile.dev — the scaffold provides one.
        If it is missing or needs changes, use this canonical content:
          web: bin/rails server -p 3000
          css: bin/rails dartsass:watch
        Solid Cable and Solid Cache do NOT need their own processes (they
        run inside Puma). Solid Queue uses bin/jobs only if background_work
        is enabled.
      - PostgreSQL MUST be running locally. Use the default socket connection (no host/password needed on macOS with Homebrew PostgreSQL)
      - Create db/seeds.rb with meaningful demo data for all core models
      - Create .env.example listing optional integration variables (none required to boot)
      - The root route MUST render a page immediately after bootstrap
      - All external service integrations MUST work without ENV vars in development (use stubs or graceful nil handling)
      - Do NOT generate tasks for production hosting, domain config, or SSL during pipeline execution
    solid_stack_setup: >
      The Rails starter includes Solid Queue, Solid Cache, and Solid
      Cable gems in the Gemfile and production database.yml entries. For
      scaffolded apps, local development MUST use explicit development
      database entries for every Solid component that is enabled. Do not
      rely on the primary database implicitly containing queue/cache/cable
      tables; that path is easy to miss and leads to bin/dev crashes during
      handoff.

      If the app needs background jobs, caching, or Action Cable in
      development, add queue/cache/cable entries under the development
      section of database.yml and wire them up in application config:

        development:
          primary:
            <<: *default
            database: myapp_development
          queue:
            <<: *default
            database: myapp_development_queue
            migrations_paths: db/queue_migrate
          cache:
            <<: *default
            database: myapp_development_cache
            migrations_paths: db/cache_migrate
          cable:
            <<: *default
            database: myapp_development_cable
            migrations_paths: db/cable_migrate

      And add connects_to directives in config/application.rb:
        config.solid_queue.connects_to = { database: { writing: :queue } }
        config.solid_cache.connects_to = { database: { writing: :cache } }
        config.solid_cable.connects_to = { database: { writing: :cable } }

      Run bin/rails db:prepare to create and migrate all databases.

      Local UAT readiness means `bin/dev` stays up cleanly on first boot.
      If Procfile.dev includes `queue: bin/jobs`, the queue database and
      Solid Queue tables MUST exist before the bootstrap task is considered
      complete.

      If the app does not need background jobs, caching, or Action Cable,
      skip the corresponding Solid gem configuration rather than installing
      it and leaving it misconfigured. For simple local-only flows, using
      the async adapter in development is better than leaving Solid Queue
      half-configured.

      ANTI-PATTERNS — common mistakes AI agents make with Procfile.dev:
      - Do NOT add `cable: bin/rails solid_cable:start` — there is no such
        command. Solid Cable polls from within the Puma process.
      - Do NOT add `cache: bin/rails solid_cache:start` — there is no such
        command. Solid Cache operates inline within the web process.
      - Do NOT use `tailwindcss:watch` — this project uses dartsass, not
        Tailwind. The CSS watcher is `bin/rails dartsass:watch`.

  - name: Models & Database
    phase: pipeline
    labels: ["backend", "database"]
    description: >
      ActiveRecord models, associations, validations, scopes, callbacks,
      database schema (migrations), and seed data.
    rails_tools:
      - ActiveRecord (models, migrations, associations)
      - ActiveStorage (file uploads)
      - ActionText (rich text content)
    guidance:
      - Define all models with explicit validations and associations
      - Use database-level constraints alongside ActiveRecord validations
      - Plan migrations with rollback safety in mind
      - Use counter_cache and database indexes for query performance
      - Use PostgreSQL-native column types where beneficial (citext, jsonb, array, uuid)
      - Include seed data for every model in db/seeds.rb so the app is usable after db:seed

  - name: Controllers & Routing
    phase: pipeline
    labels: ["backend"]
    description: >
      RESTful routes, controllers, strong parameters, filters, and
      response formats (HTML, Turbo Stream, JSON).
    rails_tools:
      - ActionController
      - ActionDispatch (routing)
    guidance:
      - Follow RESTful conventions; use resources/resource in routes
      - Keep controllers thin; push logic to models or service objects
      - Use before_action for authentication and authorization checks
      - Support both HTML and Turbo Stream response formats
      - Ensure a root route is defined from the bootstrap task onward

  - name: Views & Frontend
    phase: pipeline
    labels: ["frontend"]
    description: >
      ERB templates built by composing ui_kit partials (blocks, components,
      layouts). Turbo Frames for partial page updates, Turbo Streams for
      real-time updates, and Stimulus controllers for client-side behavior.
      All UI MUST be built from lib/ui_kit patterns — never write raw
      Bootstrap HTML.
    rails_tools:
      - ActionView (ERB, partials, layouts, helpers)
      - lib/ui_kit (vendored Rails Engine — blocks, components, layouts, screens)
      - Turbo Drive (seamless navigation)
      - Turbo Frames (scoped page updates)
      - Turbo Streams (real-time DOM updates)
      - Stimulus (lightweight JS controllers)
    guidance:
      - >
        CRITICAL: All UI MUST use lib/ui_kit composable partials. Read
        lib/ui_kit/AGENT_INSTRUCTIONS.md before building any view. Read
        lib/ui_kit/INDEX.md to find available patterns by name or category.
      - >
        Build pages bottom-up using the Lego composition model:
        Screen renders Layout (page shell with nav/sidebar/content slots),
        Layout contains Components (assemblies of multiple blocks),
        Components render Blocks (atomic Bootstrap elements).
        Use `render "ui_kit/blocks/..."` and `render "ui_kit/components/..."`.
      - >
        NEVER copy-paste HTML from ui_kit partials. ALWAYS render them:
        ✅ render "ui_kit/blocks/cards/stat_card", title: "Revenue", value: "$42K"
        ❌ <div class="card card-sm"><div class="card-body">...
        If a needed pattern does not exist, CREATE a new ui_kit partial.
      - >
        Use ui_kit helpers for convenience: ui_block("buttons/button", text: "Save"),
        ui_component("hero_sections/centered_dual_buttons", title: "Welcome"),
        ui_layout("page_shells/sidebar_with_topnav") { content }
      - Default to server-rendered HTML with Turbo for interactivity
      - Use Turbo Frames to avoid full page reloads on interactions
      - Use Stimulus only for behavior that can't be handled by Turbo
      - Keep JavaScript minimal; resist the pull toward SPA patterns
      - Design responsive layouts using Bootstrap grid and ui_kit layout shells

  - name: Authentication & Authorization
    phase: pipeline
    labels: ["auth", "backend"]
    description: >
      User registration, login, sessions, password resets, and
      role-based access control.
    rails_tools:
      - Rails 8 authentication generator (bin/rails generate authentication)
      - has_secure_password (bcrypt)
      - Session management (cookie-based)
    guidance:
      - Start with the Rails 8 built-in authentication generator
      - Add role/permission system only if multiple user types exist
      - Use Current attributes for request-scoped user context
      - Plan password reset and email confirmation flows early
      - Seed at least one test user in db/seeds.rb with known credentials for system tests

  - name: Background Jobs & Async
    phase: pipeline
    labels: ["backend"]
    description: >
      Asynchronous task processing for emails, data imports, scheduled
      tasks, and long-running operations.
    rails_tools:
      - Solid Queue (default job backend in Rails 8)
      - ActiveJob (job interface)
      - ActionMailer (email delivery)
    guidance:
      - Use Solid Queue as the default; no Redis dependency needed
      - Make all jobs idempotent and safe to retry
      - Use ActionMailer with deliver_later for all transactional emails
      - Define recurring jobs for scheduled tasks (Solid Queue recurring)
      - In development, the bootstrap or readiness task MUST prove jobs actually execute locally, either via an explicit worker process or an in-process fallback that is enabled by default

  - name: Real-Time Features
    phase: pipeline
    labels: ["backend", "frontend"]
    description: >
      WebSocket connections for live updates, notifications, and
      collaborative features.
    rails_tools:
      - Solid Cable (Action Cable adapter, no Redis needed)
      - ActionCable (WebSocket framework)
      - Turbo Streams over WebSocket (broadcasts)
    guidance:
      - Use Turbo Stream broadcasts for model-driven live updates
      - Use ActionCable channels for bidirectional real-time features
      - Solid Cable removes the Redis dependency for pub/sub
      - Design graceful degradation when WebSocket connection drops

  - name: Caching & Performance
    phase: pipeline
    labels: ["backend"]
    description: >
      Page and fragment caching, database query optimization, and
      asset performance.
    rails_tools:
      - Solid Cache (database-backed cache store)
      - Fragment caching (cache helpers in views)
      - Russian doll caching (nested cache keys)
      - ActiveRecord query optimization (includes, eager_load)
    guidance:
      - Use Solid Cache as default; no Memcached/Redis needed
      - Apply fragment caching to expensive partials early
      - Use eager loading to eliminate N+1 queries
      - Monitor with rack-mini-profiler in development

  - name: Testing
    phase: pipeline
    labels: ["testing"]
    description: >
      Test strategy covering models, controllers, system tests, and
      integration points. Tests are generated alongside feature tasks
      and must be runnable locally with zero external dependencies.
      The spec's GIVEN/WHEN/THEN scenarios are the primary source for
      integration and system test cases.
    rails_tools:
      - Minitest (default)
      - Capybara with headless Chrome (system tests)
      - Fixtures or FactoryBot (test data)
    guidance:
      - Every feature task MUST ship with at least one relevant automated test or executable experience check derived from the spec's GIVEN/WHEN/THEN scenarios
      - All tests MUST pass with bin/rails test:all using only local resources
      - System tests MUST use headless Chrome (driven_by :selenium, using: :headless_chrome)
      - No test may depend on network access, deployed services, or production credentials
      - Write model tests for all validations and critical business logic
      - Write system tests for core user flows end-to-end
      - Test Turbo Frame and Turbo Stream responses explicitly
      - Keep test database seeding fast and deterministic (PostgreSQL test database is auto-managed by Rails)
      - Use fixtures or factories that mirror db/seeds.rb structure

  - name: Deployment & Infrastructure
    phase: post_pipeline
    description: >
      Production deployment, environment configuration, SSL, and
      monitoring. This section is NOT executed during pipeline
      iterations. Tasks derived from this section should only be
      generated after the implementation has passed analysis and
      the pipeline has converged on a working local build.
    rails_tools:
      - Kamal 2 (Docker-based deployment)
      - Thruster (HTTP/2 proxy with auto SSL)
      - Rails credentials (encrypted secrets)
      - Dockerfile (included by default in Rails 8)
    guidance:
      - Use Kamal for zero-downtime deploys to any VPS or cloud server
      - Store secrets in Rails encrypted credentials, never in ENV alone
      - Use Thruster as the production entry point for SSL and compression
      - Plan database backup and migration strategy for production
      - DO NOT generate deployment tasks during pipeline iterations
      - Deployment configuration is deferred until the project passes all tier gates and analysis
