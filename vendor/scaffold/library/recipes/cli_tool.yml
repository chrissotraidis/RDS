name: CLI Tool
type: cli_tool
keywords:
  - cli
  - command
  - terminal
  - console
  - script
  - tool
  - utility
  - rake
  - generator
description: >
  Command-line interface tool built in Ruby. Uses Thor or GLI for
  argument parsing and subcommands. May optionally depend on Rails
  components (ActiveRecord, ActiveSupport) for database access or
  utilities, but runs as a standalone executable, not a web server.

framework:
  primary: Ruby (standalone)
  cli_framework: Thor (preferred) or GLI
  optional_rails: >
    ActiveRecord (standalone) for database access,
    ActiveSupport for core extensions and utilities
  packaging: RubyGems or self-contained executable via Traveling Ruby

workflow:
  capabilities:
    seed_data: true
    native_tests: true

mcp:
  capabilities:
    - docs_lookup
  hints:
    docs_lookup:
      frameworks: ["ruby", "thor"]

finalization:
  commands:
    - bundle install

verification:
  setup_commands:
    - bundle install
  boot_command: null
  health_checks:
    - command: "bundle exec bin/TOOLNAME --version"
      expected_exit_code: 0
    - command: "bundle exec bin/TOOLNAME --help"
      expected_exit_code: 0
  test_command: bundle exec rake test
  cleanup_command: null

sections:
  - name: Local Development
    phase: pipeline
    labels: ["setup"]
    description: >
      Development environment setup that ensures the CLI tool is
      invocable from the project directory with zero external
      dependencies. This is the foundation for pipeline iteration —
      every tier gate check depends on the tool being runnable.
    tools:
      - Bundler (dependency management)
      - bin/ executable entry point
    guidance:
      - The bootstrap task (task 0) MUST produce a project where bundle exec bin/TOOLNAME --help works
      - bundle install MUST succeed with no manual steps or system-level dependencies beyond Ruby
      - The bin/ executable MUST be created in the bootstrap task with correct shebang and permissions
      - If using ActiveRecord standalone, use SQLite with a local database file — no server dependency
      - Create a .env.example listing optional integration variables (none required to run)
      - All external API integrations MUST work without ENV vars (return helpful error messages or use demo/stub mode)
      - Do NOT generate tasks for gem publishing, Homebrew formulas, or binary packaging during pipeline execution

  - name: Commands & Arguments
    phase: pipeline
    labels: ["backend"]
    description: >
      Top-level commands, subcommands, positional arguments, flags,
      options, and help text.
    tools:
      - Thor (command DSL, argument parsing, help generation)
      - OptionParser (stdlib alternative for simple tools)
    guidance:
      - Define a clear command hierarchy (tool command subcommand --flag)
      - Provide --help at every level with usage examples
      - Use sensible defaults for all optional flags
      - Support both short (-v) and long (--verbose) flag forms
      - Exit with appropriate codes (0 success, 1 user error, 2 system error)

  - name: Configuration
    phase: pipeline
    labels: ["backend"]
    description: >
      Config file loading, environment variable support, and
      cascading defaults.
    tools:
      - YAML or TOML config files
      - ENV variables with fallback chains
      - XDG Base Directory conventions (~/.config/toolname/)
    guidance:
      - Support config file, ENV vars, and flags with clear precedence
      - Use XDG paths on Linux/macOS, AppData on Windows
      - Provide a config init or setup command to generate defaults
      - Never require a config file; work with sensible defaults

  - name: Core Logic
    phase: pipeline
    labels: ["backend"]
    description: >
      Business logic, data processing, file manipulation, and
      external API calls.
    tools:
      - Plain Ruby classes and modules
      - ActiveRecord (standalone) if database access is needed
      - ActiveSupport for time, string, and collection utilities
      - Net::HTTP, Faraday, or HTTParty for API calls
    guidance:
      - Keep logic in plain Ruby objects, independent of CLI framework
      - Use dependency injection to keep logic testable
      - Handle interrupts (Ctrl+C) gracefully with signal trapping
      - If using ActiveRecord standalone, manage connections explicitly
      - External API calls MUST degrade gracefully when credentials are absent (useful error message, not crash)

  - name: Output & User Interaction
    phase: pipeline
    labels: ["frontend"]
    description: >
      Formatted output, colors, tables, progress indicators, and
      interactive prompts.
    tools:
      - TTY toolkit (tty-prompt, tty-table, tty-progressbar, tty-spinner)
      - Pastel (color output)
      - $stdout / $stderr separation
    guidance:
      - Send normal output to stdout, errors and warnings to stderr
      - Support --quiet and --no-color flags
      - Use progress bars for long operations
      - Use interactive prompts for destructive actions (with --yes override)
      - Format structured data as tables or JSON (--format flag)

  - name: Testing
    phase: pipeline
    labels: ["testing"]
    description: >
      Unit tests for logic, integration tests for command execution,
      and output verification. Tests are generated alongside feature
      task and must be runnable locally with zero external dependencies.
      The spec's GIVEN/WHEN/THEN scenarios are the primary source for
      integration test cases.
    tools:
      - Minitest (default)
      - Aruba (CLI integration testing)
      - StringIO (capture stdout/stderr in tests)
    guidance:
      - Every command or parser task MUST ship with at least one relevant unit or integration test derived from the spec's GIVEN/WHEN/THEN scenarios
      - All tests MUST pass with bundle exec rake test using only local resources
      - No test may depend on network access, deployed services, or production credentials
      - Test core logic independently from CLI interface
      - Test full command invocations with Aruba for integration coverage
      - Verify exit codes, stdout content, and stderr content
      - Test config file parsing and precedence rules
      - Mock external API calls with WebMock — never call real services in tests
      - Use fixtures or sample data files checked into the test/ directory

  - name: Distribution & Packaging
    phase: post_pipeline
    description: >
      Gem packaging, installation instructions, and platform support.
      This section is NOT executed during pipeline iterations. Tasks
      derived from this section should only be generated after the
      implementation has passed analysis and the pipeline has converged
      on a working local build.
    tools:
      - RubyGems (gem build, gem push)
      - Bundler (dependency management)
      - Traveling Ruby or Ruby Packer (self-contained binaries)
    guidance:
      - Package as a gem with a clear bin/ executable
      - Pin dependencies tightly in gemspec
      - Test on Ruby versions you claim to support
      - Provide Homebrew formula or install script if targeting non-Ruby users
      - DO NOT generate packaging or distribution tasks during pipeline iterations
      - Distribution configuration is deferred until the project passes all tier gates and analysis
