name: Next.js Full-Stack
type: nextjs_fullstack
keywords:
  - nextjs
  - next.js
  - app router
  - server actions
  - dashboard
  - saas
  - web app
description: >
  Modern full-stack React application built with Next.js App Router,
  TypeScript, Bun, server components, route handlers, and optional
  database/auth skills.

framework:
  primary: Next.js
  router: App Router
  language: TypeScript
  runtime: Bun
  deployment: Zo HTTP service

workflow:
  capabilities:
    browser_ui: true
    http_routes: true
    server_actions: true
    client_state: true
    accessibility: true
    native_tests: false

finalization:
  commands:
    - bun install
    - bun run build
  checks:
    - name: Next.js build
      command: bun run build
      type: compilation
      required: true

verification:
  setup_commands:
    - bun install
  boot_command: bunx next dev --hostname 0.0.0.0 --port 3000
  health_checks:
    - url: "http://localhost:3000/api/health"
      expected_status: 200
    - url: "http://localhost:3000/"
      expected_status: 200
  test_command: bun run build

sections:
  - name: Local Development
    phase: pipeline
    labels: ["setup"]
    description: Keep the generated project a bootable Next.js App Router app.
    guidance:
      - Preserve package scripts: dev, build, start, typecheck.
      - Preserve /api/health because RDS uses it as the stack health check.
      - Do not replace this project with Vite, Rails, Astro, or a separate backend.
      - External services must be optional unless the PRD explicitly requires them.

  - name: App Router Surface
    phase: pipeline
    labels: ["frontend", "backend"]
    description: Implement routes, layouts, server components, and interactive client components.
    guidance:
      - Use server components by default.
      - Add "use client" only to components that need browser state or events.
      - Keep route handlers under app/api and return typed JSON.
      - Avoid hydration mismatches from random values, dates, or browser-only APIs in server components.

  - name: Product Experience
    phase: pipeline
    labels: ["frontend", "design"]
    description: Build the actual product surface, not a generic landing page.
    guidance:
      - Make the first viewport show usable product state.
      - Use stable responsive layouts for dashboards, tables, toolbars, and forms.
      - Keep empty, loading, and error states visible and useful.

  - name: Quality
    phase: pipeline
    labels: ["qa"]
    description: Verify compile, boot, and browser behavior.
    guidance:
      - bun run build must pass.
      - /api/health must return 200.
      - Fix console and hydration errors before declaring done.
