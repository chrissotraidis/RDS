name: Smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  fast:
    name: Fast tier (static assertions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Run smoke (fast)
        run: ruby test/smoke.rb
