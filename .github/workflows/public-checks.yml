name: Public checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  static-and-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Check diff hygiene
        run: git diff --check

      - name: Check shell syntax
        run: |
          find bin bootstrap stacks -type f \
            ! -path '*/node_modules/*' \
            ! -path '*/tmp/*' \
            -exec awk 'NR==1 && $0 ~ /^#!.*(bash|sh)/ { print FILENAME }' {} \; \
            | sort \
            | xargs -r bash -n

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: bun install --frozen-lockfile || bun install

      - name: Bundle dashboard server
        run: bun build dashboard/src/server.ts --outdir /tmp/rds-dashboard-build-check
